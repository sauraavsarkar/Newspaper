<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="70%" fx="50%" fy="30%">
      <stop offset="0%" stop-color="#1e1b4b" />
      <stop offset="60%" stop-color="#0f0f16" />
      <stop offset="100%" stop-color="#07070a" />
    </radialGradient>

    <!-- Glowing Spotlights -->
    <radialGradient id="cyan-glow" cx="20%" cy="30%" r="35%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="purple-glow" cx="80%" cy="70%" r="45%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0" />
    </radialGradient>

    <!-- Glass Fill & Border Gradients -->
    <linearGradient id="glass-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.07" />
      <stop offset="12%" stop-color="#ffffff" stop-opacity="0.03" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.01" />
    </linearGradient>
    <linearGradient id="glass-border" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18" />
      <stop offset="40%" stop-color="#ffffff" stop-opacity="0.05" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.1" />
    </linearGradient>

    <!-- Neon Gradients -->
    <linearGradient id="cyan-neon" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <linearGradient id="purple-neon" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d946ef" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    <linearGradient id="green-neon" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>

    <!-- Chart Fill Gradients -->
    <linearGradient id="cyan-area" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0" />
    </linearGradient>

    <!-- Glow Filters -->
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-purple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <style>
      .text-title { font-family: 'Outfit', 'Inter', system-ui, sans-serif; font-weight: 700; fill: #ffffff; }
      .text-body { font-family: 'Inter', system-ui, sans-serif; font-size: 13px; fill: #94a3b8; }
      .text-muted { font-family: 'Inter', system-ui, sans-serif; font-size: 11px; fill: #64748b; }
      .glass-card { rx: 16px; fill: url(#glass-grad); stroke: url(#glass-border); stroke-width: 1px; }
      .sidebar-item { cursor: pointer; transition: all 0.3s; }
      .sidebar-item:hover { opacity: 0.8; }
      .btn { cursor: pointer; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="750" fill="url(#bg-grad)" />
  <rect width="1200" height="750" fill="url(#cyan-glow)" />
  <rect width="1200" height="750" fill="url(#purple-glow)" />

  <!-- ================= SIDE NAVIGATION BAR ================= -->
  <rect x="25" y="25" width="80" height="700" class="glass-card" />
  
  <!-- Sidebar Brand Logo -->
  <circle cx="65" cy="65" r="16" fill="url(#cyan-neon)" filter="url(#glow-cyan)" />
  <path d="M60 58 L70 65 L60 72 Z" fill="#ffffff" />

  <!-- Sidebar Nav Items (Frosted glass controls) -->
  <g class="sidebar-item" transform="translate(45, 150)">
    <rect width="40" height="40" rx="8" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.1" />
    <path d="M12 12 h16 v16 h-16 z" fill="none" stroke="#06b6d4" stroke-width="2" stroke-linecap="round" />
    <path d="M16 12 v16 M12 20 h16" stroke="#06b6d4" stroke-width="1.5" />
  </g>

  <g class="sidebar-item" transform="translate(45, 210)">
    <rect width="40" height="40" rx="8" fill="#ffffff" fill-opacity="0.02" />
    <path d="M14 14 h12 v12 h-12 z" fill="none" stroke="#94a3b8" stroke-width="2" />
    <path d="M18 18 h4 M18 22 h4" stroke="#94a3b8" stroke-width="2" />
  </g>

  <g class="sidebar-item" transform="translate(45, 270)">
    <rect width="40" height="40" rx="8" fill="#ffffff" fill-opacity="0.02" />
    <path d="M12 15 c0-2 4-3 8-3 s8 1 8 3 v10 c0 2-4 3-8 3 s-8-1-8-3 z" fill="none" stroke="#94a3b8" stroke-width="2" />
    <path d="M12 20 c3 2 13 2 16 0" fill="none" stroke="#94a3b8" stroke-width="1.5" />
  </g>

  <g class="sidebar-item" transform="translate(45, 330)">
    <rect width="40" height="40" rx="8" fill="#ffffff" fill-opacity="0.02" />
    <path d="M20 12 a8 8 0 1 0 0 16 a8 8 0 1 0 0-16" fill="none" stroke="#94a3b8" stroke-width="2" />
    <path d="M20 16 v4 l3 2" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" />
  </g>

  <g class="sidebar-item" transform="translate(45, 655)">
    <circle cx="20" cy="20" r="16" fill="#ffffff" fill-opacity="0.05" />
    <path d="M15 15 L25 25 M25 15 L15 25" stroke="#f355da" stroke-width="2" stroke-linecap="round" />
  </g>

  <!-- ================= TOP HEADER BAR ================= -->
  <g transform="translate(130, 25)">
    <rect width="1045" height="70" class="glass-card" />
    
    <!-- Title -->
    <text x="30" y="42" class="text-title" font-size="22">Today Morning News</text>
    <text x="250" y="42" class="text-body" font-size="14" fill="#64748b">|</text>
    <text x="275" y="41" class="text-body" font-size="14" font-weight="500" fill="#a78bfa" filter="url(#glow-purple)">Daily Editorial Engine</text>

    <!-- Search bar (Mock) -->
    <rect x="580" y="18" width="260" height="34" rx="17" fill="#000000" fill-opacity="0.2" stroke="#ffffff" stroke-opacity="0.1" />
    <text x="615" y="40" class="text-body" fill="#475569">Quick Search...</text>
    <path d="M595 35 a4 4 0 1 1 8 0 a4 4 0 1 1 -8 0 M601 38 l4 4" stroke="#475569" stroke-width="2" fill="none" />

    <!-- User Badge -->
    <g transform="translate(870, 15)">
      <rect width="145" height="40" rx="20" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.08" />
      <circle cx="25" cy="20" r="14" fill="url(#cyan-neon)" />
      <text x="20" y="24" class="text-title" font-size="11" fill="#ffffff">JD</text>
      <text x="48" y="21" class="text-title" font-size="11" font-weight="600">John Editor</text>
      <text x="48" y="32" class="text-muted" font-size="9" fill="#06b6d4">Super Admin</text>
      <circle cx="125" cy="20" r="4" fill="#10b981" filter="url(#glow-cyan)" />
    </g>
  </g>

  <!-- ================= GRID MAIN CONTENT ================= -->

  <!-- CARD 1: LIVE ARTICLE TRAFFIC (ANALYTICS LINE CHART) -->
  <g transform="translate(130, 115)">
    <rect width="680" height="360" class="glass-card" />
    
    <!-- Header -->
    <text x="30" y="38" class="text-title" font-size="16">Live Editorial Traffic</text>
    <text x="30" y="55" class="text-muted">Real-time readership analytics across categories</text>

    <g class="btn" transform="translate(560, 20)">
      <rect width="90" height="26" rx="6" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.1" />
      <text x="18" y="17" class="text-title" font-size="11" fill="#38bdf8">Last 24 Hours</text>
    </g>

    <!-- Chart Y-axis Labels -->
    <text x="30" y="110" class="text-muted">100k</text>
    <text x="30" y="170" class="text-muted">75k</text>
    <text x="30" y="230" class="text-muted">50k</text>
    <text x="30" y="290" class="text-muted">25k</text>
    <text x="30" y="335" class="text-muted">0</text>

    <!-- Grid Lines -->
    <line x1="70" y1="105" x2="640" y2="105" stroke="#ffffff" stroke-opacity="0.04" stroke-dasharray="4" />
    <line x1="70" y1="165" x2="640" y2="165" stroke="#ffffff" stroke-opacity="0.04" stroke-dasharray="4" />
    <line x1="70" y1="225" x2="640" y2="225" stroke="#ffffff" stroke-opacity="0.04" stroke-dasharray="4" />
    <line x1="70" y1="285" x2="640" y2="285" stroke="#ffffff" stroke-opacity="0.04" stroke-dasharray="4" />
    <line x1="70" y1="330" x2="640" y2="330" stroke="#ffffff" stroke-opacity="0.08" />

    <!-- Chart Area Fill -->
    <path d="M 70 330 
             L 70 240 
             Q 130 190, 190 250 
             T 310 130 
             Q 370 120, 430 180 
             T 550 90 
             L 640 180 
             L 640 330 Z" 
          fill="url(#cyan-area)" />

    <!-- Glowing Cyan Chart Line -->
    <path d="M 70 240 
             Q 130 190, 190 250 
             T 310 130 
             Q 370 120, 430 180 
             T 550 90 
             L 640 180" 
          fill="none" stroke="url(#cyan-neon)" stroke-width="4" filter="url(#glow-cyan)" />

    <!-- Secondary Purple Chart Line -->
    <path d="M 70 280 
             Q 150 260, 230 300 
             T 390 190 
             Q 470 180, 550 220 
             L 640 120" 
          fill="none" stroke="url(#purple-neon)" stroke-width="2.5" filter="url(#glow-purple)" opacity="0.8" />

    <!-- Data points -->
    <circle cx="310" cy="130" r="5" fill="#ffffff" stroke="#00f2fe" stroke-width="2" filter="url(#glow-cyan)" />
    <circle cx="550" cy="90" r="5" fill="#ffffff" stroke="#00f2fe" stroke-width="2" filter="url(#glow-cyan)" />

    <!-- Tooltip (Mock) -->
    <g transform="translate(490, 30)">
      <rect width="90" height="46" rx="6" fill="#090d16" stroke="#ffffff" stroke-opacity="0.15" />
      <text x="10" y="18" class="text-title" font-size="10" fill="#ffffff">Peak Hour</text>
      <text x="10" y="34" class="text-title" font-size="13" fill="#00f2fe">92,410 views</text>
    </g>

    <!-- X-axis Labels -->
    <text x="70" y="348" class="text-muted">08:00</text>
    <text x="180" y="348" class="text-muted">12:00</text>
    <text x="300" y="348" class="text-muted">16:00</text>
    <text x="420" y="348" class="text-muted">20:00</text>
    <text x="540" y="348" class="text-muted">00:00</text>
    <text x="625" y="348" class="text-muted">04:00</text>
  </g>

  <!-- CARD 2: SYSTEM SCORES / KEY METRICS -->
  <g transform="translate(830, 115)">
    <rect width="345" height="360" class="glass-card" />

    <!-- Title -->
    <text x="25" y="38" class="text-title" font-size="16">Editorial Core Performance</text>
    <text x="25" y="55" class="text-muted">Real-time CMS response metrics</text>

    <!-- Large Radial Progress ring (98% Speed Score) -->
    <g transform="translate(172, 175)">
      <!-- Outer Track -->
      <circle cx="0" cy="0" r="70" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="12" />
      
      <!-- Colored Gauge (Dasharray is based on 2 * PI * r = 439.8) -->
      <!-- 98% is 431 active, remaining 8 is offset -->
      <circle cx="0" cy="0" r="70" fill="none" stroke="url(#cyan-neon)" stroke-width="12" 
              stroke-dasharray="431 439.8" stroke-dashoffset="110" stroke-linecap="round" filter="url(#glow-cyan)" />
      
      <circle cx="0" cy="0" r="55" fill="#000000" fill-opacity="0.3" />

      <!-- Center text -->
      <text x="0" y="5" class="text-title" font-size="28" text-anchor="middle">98%</text>
      <text x="0" y="20" class="text-muted" font-size="10" fill="#64748b" text-anchor="middle">Lighthouse</text>
    </g>

    <!-- Micro metrics bar grid -->
    <g transform="translate(25, 275)">
      <text x="0" y="15" class="text-title" font-size="12" fill="#e2e8f0">Draft Publish Speed</text>
      <text x="295" y="15" class="text-title" font-size="12" fill="#00f2fe" text-anchor="end">0.8s</text>
      <rect x="0" y="23" width="295" height="6" rx="3" fill="#ffffff" fill-opacity="0.05" />
      <rect x="0" y="23" width="240" height="6" rx="3" fill="url(#cyan-neon)" />

      <text x="0" y="50" class="text-title" font-size="12" fill="#e2e8f0">DB Sync Latency</text>
      <text x="295" y="50" class="text-title" font-size="12" fill="#d946ef" text-anchor="end">12ms</text>
      <rect x="0" y="58" width="295" height="6" rx="3" fill="#ffffff" fill-opacity="0.05" />
      <rect x="0" y="58" width="275" height="6" rx="3" fill="url(#purple-neon)" />
    </g>
  </g>

  <!-- CARD 3: RECENT PUBLICATIONS (BOTTOM LEFT) -->
  <g transform="translate(130, 495)">
    <rect width="520" height="230" class="glass-card" />

    <!-- Title -->
    <text x="25" y="38" class="text-title" font-size="15">Recent Publications</text>
    <text x="25" y="53" class="text-muted">Live articles currently syndicating worldwide</text>

    <!-- Table Rows -->
    <g transform="translate(25, 75)">
      <!-- Row 1 -->
      <g transform="translate(0, 0)">
        <rect width="470" height="42" rx="8" fill="#ffffff" fill-opacity="0.02" />
        <circle cx="20" cy="21" r="5" fill="#10b981" filter="url(#glow-cyan)" />
        <text x="40" y="25" class="text-title" font-size="12">AI Journalism: Shift in Newsrooms</text>
        
        <!-- Category Badge -->
        <rect x="295" y="11" width="70" height="20" rx="4" fill="#0ea5e9" fill-opacity="0.15" stroke="#0ea5e9" stroke-opacity="0.3" />
        <text x="330" y="24" class="text-title" font-size="9" fill="#38bdf8" text-anchor="middle">Technology</text>

        <text x="450" y="25" class="text-title" font-size="11" fill="#94a3b8" text-anchor="end">42.5k views</text>
      </g>

      <!-- Row 2 -->
      <g transform="translate(0, 48)">
        <rect width="470" height="42" rx="8" fill="#ffffff" fill-opacity="0.02" />
        <circle cx="20" cy="21" r="5" fill="#10b981" filter="url(#glow-cyan)" />
        <text x="40" y="25" class="text-title" font-size="12">Global Markets Rally Amid Reforms</text>
        
        <!-- Category Badge -->
        <rect x="295" y="11" width="70" height="20" rx="4" fill="#10b981" fill-opacity="0.15" stroke="#10b981" stroke-opacity="0.3" />
        <text x="330" y="24" class="text-title" font-size="9" fill="#34d399" text-anchor="middle">Economy</text>

        <text x="450" y="25" class="text-title" font-size="11" fill="#94a3b8" text-anchor="end">18.9k views</text>
      </g>

      <!-- Row 3 -->
      <g transform="translate(0, 96)">
        <rect width="470" height="42" rx="8" fill="#ffffff" fill-opacity="0.02" />
        <circle cx="20" cy="21" r="5" fill="#e11d48" />
        <text x="40" y="25" class="text-title" font-size="12">Design System Upgrades in CMS 4.0</text>
        
        <!-- Category Badge -->
        <rect x="295" y="11" width="70" height="20" rx="4" fill="#8b5cf6" fill-opacity="0.15" stroke="#8b5cf6" stroke-opacity="0.3" />
        <text x="330" y="24" class="text-title" font-size="9" fill="#c084fc" text-anchor="middle">Design</text>

        <text x="450" y="25" class="text-title" font-size="11" fill="#64748b" text-anchor="end">Draft Remark</text>
      </g>
    </g>
  </g>

  <!-- CARD 4: EDITORIAL TEAM FEEDBACK (BOTTOM RIGHT) -->
  <g transform="translate(670, 495)">
    <rect width="505" height="230" class="glass-card" />

    <!-- Title -->
    <text x="25" y="38" class="text-title" font-size="15">Editorial Commands &amp; Alerts</text>
    <text x="25" y="53" class="text-muted">Direct remarks and validation approvals</text>

    <!-- Table Rows -->
    <g transform="translate(25, 75)">
      <!-- Row 1 -->
      <g transform="translate(0, 0)">
        <rect width="455" height="42" rx="8" fill="#ffffff" fill-opacity="0.02" />
        <circle cx="20" cy="21" r="10" fill="url(#cyan-neon)" />
        <text x="20" y="24" class="text-title" font-size="8" fill="#ffffff" text-anchor="middle">ES</text>
        
        <text x="42" y="20" class="text-title" font-size="11">Edits requested on "AI Journalism"</text>
        <text x="42" y="32" class="text-muted" font-size="9" fill="#475569">Editorial Board: Check factual stats on line 12</text>

        <rect x="365" y="11" width="75" height="20" rx="4" fill="#fbbf24" fill-opacity="0.1" stroke="#fbbf24" stroke-opacity="0.2" />
        <text x="402" y="24" class="text-title" font-size="9" fill="#f59e0b" text-anchor="middle">Fix Required</text>
      </g>

      <!-- Row 2 -->
      <g transform="translate(0, 48)">
        <rect width="455" height="42" rx="8" fill="#ffffff" fill-opacity="0.02" />
        <circle cx="20" cy="21" r="10" fill="url(#purple-neon)" />
        <text x="20" y="24" class="text-title" font-size="8" fill="#ffffff" text-anchor="middle">MS</text>
        
        <text x="42" y="20" class="text-title" font-size="11">Proofreading completed: "Global Markets"</text>
        <text x="42" y="32" class="text-muted" font-size="9" fill="#475569">Chief Editor: Cleared for frontpage promotion</text>

        <rect x="365" y="11" width="75" height="20" rx="4" fill="#10b981" fill-opacity="0.1" stroke="#10b981" stroke-opacity="0.2" />
        <text x="402" y="24" class="text-title" font-size="9" fill="#10b981" text-anchor="middle">Approved</text>
      </g>

      <!-- Row 3 -->
      <g transform="translate(0, 96)">
        <rect width="455" height="42" rx="8" fill="#ffffff" fill-opacity="0.02" />
        <circle cx="20" cy="21" r="10" fill="#ffffff" fill-opacity="0.1" />
        <text x="20" y="24" class="text-title" font-size="8" fill="#ffffff" text-anchor="middle">SYS</text>
        
        <text x="42" y="20" class="text-title" font-size="11">Automated backup sequence</text>
        <text x="42" y="32" class="text-muted" font-size="9" fill="#475569">Daily database snapshot created successfully</text>

        <rect x="365" y="11" width="75" height="20" rx="4" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.1" />
        <text x="402" y="24" class="text-title" font-size="9" fill="#94a3b8" text-anchor="middle">Complete</text>
      </g>
    </g>
  </g>
</svg>
